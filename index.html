<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firebase 初始化工具</title>
<style>
body{font-family:system-ui,sans-serif;max-width:500px;margin:40px auto;padding:20px;background:#f3f4f6}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
h2{font-size:18px;font-weight:800;margin-bottom:14px;color:#1f2937}
label{display:block;font-size:13px;font-weight:700;color:#374151;margin-bottom:5px}
input,select{width:100%;padding:10px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;margin-bottom:10px;font-family:inherit;box-sizing:border-box}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer;color:#fff}
.btn.p{background:#2563eb}.btn.s{background:#16a34a}.btn.d{background:#dc2626}
.log{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:12px;font-size:13px;color:#374151;min-height:80px;margin-top:10px;white-space:pre-line;line-height:1.6}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
</style>
</head>
<body>
<div class="card">
  <h2>🏪 Firebase 初始化工具</h2>
  <p style="font-size:13px;color:#6b7280;margin-bottom:14px">用這個工具快速新增門市和員工到 Firebase</p>

  <h2>1. 新增門市</h2>
  <label>門市名稱</label><input id="s-name" value="貝穀博愛店">
  <div class="row">
    <div><label>緯度</label><input id="s-lat" value="24.8328"></div>
    <div><label>經度</label><input id="s-lng" value="121.0095"></div>
  </div>
  <label>允許範圍（公尺）</label><input id="s-radius" type="number" value="300">
  <button class="btn p" onclick="addStore()">➕ 新增門市</button>

  <div style="margin-top:16px">
    <h2>2. 新增員工</h2>
    <label>姓名</label><input id="e-name" placeholder="例：王小明">
    <label>員工編號（登入用）</label><input id="e-code" placeholder="例：EMP001" style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()">
    <label>所屬門市 ID</label><input id="e-store" placeholder="新增門市後自動填入" id="e-store">
    <label>角色</label>
    <select id="e-role"><option value="employee">員工</option><option value="manager">主管</option></select>
    <button class="btn s" onclick="addEmployee()">➕ 新增員工</button>
  </div>

  <div style="margin-top:16px">
    <h2>3. 查看目前資料</h2>
    <button class="btn p" onclick="listAll()" style="margin-bottom:8px">🔍 查看所有門市和員工</button>
    <button class="btn d" onclick="clearAll()">🗑️ 清空所有資料（謹慎使用）</button>
  </div>

  <div class="log" id="log">操作記錄會顯示在這裡…</div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
import { getDatabase, ref, set, get, push, remove } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyDp3j6gxWptUPSUEohR27IfkCjzzBk1Gl4",
  authDomain: "punch-83688.firebaseapp.com",
  databaseURL: "https://punch-83688-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "punch-83688",
  storageBucket: "punch-83688.firebasestorage.app",
  messagingSenderId: "68649051357",
  appId: "1:68649051357:web:d4e0c4913e026091052734"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

function log(msg) {
  const el = document.getElementById('log');
  el.textContent += msg + '\n';
  el.scrollTop = el.scrollHeight;
}

let lastStoreId = '';

window.addStore = async function() {
  const name = document.getElementById('s-name').value.trim();
  const lat = parseFloat(document.getElementById('s-lat').value);
  const lng = parseFloat(document.getElementById('s-lng').value);
  const radius = parseInt(document.getElementById('s-radius').value) || 300;
  if (!name) { log('⚠️ 請填寫門市名稱'); return; }
  try {
    const r = await push(ref(db, 'stores'), {name, lat, lng, radius, active: true});
    lastStoreId = r.key;
    document.getElementById('e-store').value = lastStoreId;
    log('✅ 門市已新增！ID：' + lastStoreId + '，名稱：' + name);
  } catch(e) { log('❌ 錯誤：' + e.message); }
}

window.addEmployee = async function() {
  const name = document.getElementById('e-name').value.trim();
  const code = document.getElementById('e-code').value.trim().toUpperCase();
  const storeId = document.getElementById('e-store').value.trim();
  const role = document.getElementById('e-role').value;
  if (!name) { log('⚠️ 請填寫姓名'); return; }
  if (!code) { log('⚠️ 請填寫員工編號'); return; }
  if (!storeId) { log('⚠️ 請填寫門市 ID（先新增門市）'); return; }
  try {
    const r = await push(ref(db, 'employees'), {name, code, storeId, role, active: true});
    log('✅ 員工已新增！' + name + '（' + code + '）・' + role + '・門市：' + storeId);
    document.getElementById('e-name').value = '';
    document.getElementById('e-code').value = '';
  } catch(e) { log('❌ 錯誤：' + e.message); }
}

window.listAll = async function() {
  try {
    const [stSnap, eSnap] = await Promise.all([
      get(ref(db, 'stores')),
      get(ref(db, 'employees'))
    ]);
    log('\n── 門市 ──');
    if (stSnap.exists()) {
      Object.entries(stSnap.val()).forEach(([k,v]) => log('  [' + k + '] ' + v.name + ' (' + (v.active?'啟用':'停用') + ')'));
    } else log('  （無門市資料）');
    log('── 員工 ──');
    if (eSnap.exists()) {
      Object.entries(eSnap.val()).forEach(([k,v]) => log('  [' + k + '] ' + v.name + '（' + v.code + '）・' + v.role));
    } else log('  （無員工資料）');
  } catch(e) { log('❌ 錯誤：' + e.message); }
}

window.clearAll = async function() {
  if (!confirm('確定要清空所有門市和員工資料嗎？')) return;
  try {
    await Promise.all([
      remove(ref(db, 'stores')),
      remove(ref(db, 'employees'))
    ]);
    log('🗑️ 所有門市和員工資料已清空');
  } catch(e) { log('❌ 錯誤：' + e.message); }
}

log('✅ 工具已載入，可以開始新增資料');
</script>
</body>
</html>
